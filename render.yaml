services:
  - type: web
    name: neural-inference
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: artifacts
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
